<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>parkrun Courses Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">parkrun Courses & Events</h1>
        <div id="courses-container" class="space-y-3"></div>
    </div>

    <script>
        // Inlined courses data - no fetch required, works directly from file://
        const courses = [
  {
    "id": "albertmelbourne",
    "name": "Albert Park",
    "url": "https://www.parkrun.com.au/albertmelbourne",
    "country": "Australia",
    "region": "Victoria",
    "totalEvents": 725
  },
  {
    "id": "jells",
    "name": "Jells Park",
    "url": "https://www.parkrun.com.au/jells",
    "country": "Australia",
    "region": "Victoria",
    "totalEvents": 587
  },
  {
    "id": "warringal-parklands",
    "name": "Warringal Parklands",
    "url": "https://www.parkrun.com.au/warringalparklands",
    "country": "Australia",
    "region": "Victoria",
    "totalEvents": 489
  },
  {
    "id": "darebin",
    "name": "Darebin",
    "url": "https://www.parkrun.com.au/darebin",
    "country": "Australia",
    "region": "Victoria",
    "totalEvents": 612
  },
  {
    "id": "diamond-creek",
    "name": "Diamond Creek",
    "url": "https://www.parkrun.com.au/diamondcreek",
    "country": "Australia",
    "region": "Victoria",
    "totalEvents": 356
  },
  {
    "id": "centennial",
    "name": "Centennial",
    "url": "https://www.parkrun.com.au/centennial",
    "country": "Australia",
    "region": "New South Wales",
    "totalEvents": 678
  },
  {
    "id": "bushy-park",
    "name": "Bushy Park",
    "url": "https://www.parkrun.org.uk/bushypark",
    "country": "United Kingdom",
    "region": "London",
    "totalEvents": 924
  }
];

        const container = document.getElementById('courses-container');

        courses.forEach(course => {
            const row = document.createElement('div');
            row.className = 'bg-white rounded-lg shadow-sm p-4 flex flex-wrap items-center gap-x-4 gap-y-2';

            const courseLink = document.createElement('a');
            courseLink.href = course.url;
            courseLink.target = '_blank';
            courseLink.className = 'font-medium text-gray-900 hover:text-blue-600 w-48 shrink-0';
            courseLink.textContent = course.name;

            const eventsContainer = document.createElement('div');
            eventsContainer.className = 'flex flex-wrap gap-1 text-sm font-mono';

            // Show last 25 events
            const startEvent = course.totalEvents;
            const endEvent = Math.max(1, course.totalEvents - 24);

            for (let eventNum = startEvent; eventNum >= endEvent; eventNum--) {
                const eventLink = document.createElement('a');
                eventLink.href = `${course.url}/results/${eventNum}`;
                eventLink.target = '_blank';
                eventLink.className = 'px-2 py-1 rounded bg-gray-100 hover:bg-blue-100 hover:text-blue-700 text-gray-600';
                eventLink.textContent = eventNum;
                eventsContainer.appendChild(eventLink);
            }

            row.appendChild(courseLink);
            row.appendChild(eventsContainer);
            container.appendChild(row);
        });
    </script>
</body>
</html>
